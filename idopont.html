<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Időpontfoglalás - Gumiverzum</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="carbon-fiber">

    <header class="header">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
            GUMIVERZUM<span>.HU</span>
        </div>
        <nav class="nav-menu">
            <a href="index.html">Kezdőlap</a>
            <a href="#" class="active">Időpontfoglalás</a>
            <a href="login.html" class="btn-login">BEJELENTKEZÉS</a>
        </nav>
    </header>

    <main class="page-section">
        <div class="form-card">
            <h2>IDŐPONT <span>FOGLALÁS</span></h2>
            <p style="color: #ccc; margin-bottom: 20px; font-size: 14px;">Kérjük, adja meg adatait a foglaláshoz!</p>
            
            <div class="booking-form">
                <div class="form-group">
                    <label><i class="fa-solid fa-user"></i> Teljes név</label>
                    <input type="text" id="name" class="input-field" placeholder="Gipsz Jakab">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-phone"></i> Telefonszám</label>
                    <input type="text" id="phone" class="input-field" placeholder="06301234567">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-calendar-days"></i> Dátum választás</label>
                    <input type="date" id="date" class="input-field">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-car"></i> Szolgáltatás típusa</label>
                    <select id="service" class="input-field">
                        <option value="kereccsere">Teljes kerékcsere</option>
                        <option value="centrirozas">Centrírozás</option>
                        <option value="javitas">Defektjavítás</option>
                        <option value="tarolas">Gumi tárolás (Hotel)</option>
                    </select>
                </div>

                <button class="btn-red" onclick="validateAndSubmit()">FOGLALÁS ELKÜLDÉSE</button>
            </div>
            
            <div id="status-msg" style="margin-top: 20px; display: none; padding: 10px; border-radius: 4px;"></div>
        </div>
    </main>

    <script src="idopont.js"></script>
</body>
</html>
